<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="profile-wrapper">

        <section class="profile-card">

            <img src="/assets/images/avatar.jpg" alt="Avatar" class="avatar">

            <h1>Nguyễn Nhựt Thịnh</h1>

            <p class="job-title">
                Sinh viên ngành Công nghệ Thông tin
            </p>

            <p class="description" id="description">
                Tôi đang học lập trình Web Front-end và yêu thích thiết kế giao diện website đơn giản, hiện đại và thân thiện với người dùng.
            </p>

            <h3>Kỹ năng</h3>

            <ul class="skill-list">
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
                <li>Responsive Web</li>
            </ul>

            <div class="social-links">
                <a href="#">Facebook</a>
                <a href="#">GitHub</a>
                <a href="#">Email</a>
            </div>

            <div class="button-group">
                <button id="themeBtn">
                    🌙 Đổi giao diện
                </button>

                <button id="introBtn">
                    Đổi giới thiệu
                </button>
            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
